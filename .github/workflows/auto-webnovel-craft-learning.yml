name: Auto Webnovel Craft Learning 5m

on:
  schedule:
    # Run every 5 minutes on GitHub Actions. This works even when the local PC is off.
    - cron: '*/5 * * * *'

permissions:
  contents: write

concurrency:
  group: auto-webnovel-craft-learning-5m
  cancel-in-progress: false

jobs:
  craft-research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run craft learning batch
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          python scripts/craft_learning_batch.py

      - name: Commit research updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research
          if git diff --cached --quiet; then
            echo "No research changes to commit."
          else
            git commit -m "Auto learn webnovel craft"
            git push
          fi

name: Webnovel Craft Auto Learning Every 5 Minutes

on:
  schedule:
    # Every 5 minutes, offset from the busiest 0/5/10 minute marks.
    - cron: '2-57/5 * * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/daily-craft-research.yml'
      - 'scripts/craft_learning_batch.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: webnovel-craft-auto-learning
  cancel-in-progress: false

jobs:
  craft-research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run craft learning batch
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          python scripts/craft_learning_batch.py

      - name: Commit research updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research
          if git diff --cached --quiet; then
            echo "No research changes to commit."
          else
            git commit -m "Auto learn webnovel craft"
            git push
          fi

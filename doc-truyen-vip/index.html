<!doctype html>
<html lang="vi">
  <head>

    />
    <meta name="robots" content="index, follow" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vominhthanh996-lang.github.io/tram-truyen/" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Điều hướng chính">
        <a class="brand" href="#/">
          <span class="brand-mark">T</span>
          <span>
            <strong>Trạm Truyện</strong>
            <small>Đọc và nghe truyện dài kỳ</small>
          </span>
        </a>
        <nav class="nav-list">
          <a href="#/" data-nav="home">Trang chủ</a>
          <a href="#/library" data-nav="library">Thư viện</a>
          <a href="#/wallet" data-nav="wallet">Nạp xu</a>
        </nav>
        <div class="sidebar-card">
          <span>Gói đề xuất</span>
          <strong>VIP 30 ngày</strong>

          <button class="btn btn-primary" data-open-checkout="vip_30">Mua VIP</button>

      </aside>

      <main class="main">

          <button class="icon-btn mobile-menu" id="menuToggle" aria-label="Mở menu">☰</button>

          <div class="account-pill" id="accountPill"></div>
        </header>

        <section id="view" class="view" tabindex="-1"></section>
      </main>
    </div>

    <div class="modal-backdrop" id="checkoutModal" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="checkoutTitle">
        <button class="icon-btn modal-close" id="closeCheckout" aria-label="Đóng">×</button>
        <div id="checkoutContent"></div>
      </section>
    </div>

    <div class="toast-stack" id="toastStack" aria-live="polite"></div>

    <script src="./supabase-config.js"></script>
    <script src="./data.js"></script>
